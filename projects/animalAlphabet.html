<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="author" content="Noah Campbell">
<title>Animal Alphabet</title>
<link rel="icon" href="images/alphabetIcon.jpg">
<style>
    a { 
        background-color: red;
        text-decoration: none;
    }

    a:hover { background-color: cyan;}

    body { text-align: center;}

    .grid {
        display: grid;
        grid-template-columns: repeat(1, 1fr);
        gap: 10px;
        text-align: center;
    }

    header { font-size: larger; color: cyan; font-family: "Comic Sans MS", cursive, sans-serif;}

</style>
</head>
<body>
    <h3 id="top">
        <a href="#numberA">A</a>|
        <a href="#numberB">B</a>|
        <a href="#numberC">C</a>|
        <a href="#numberD">D</a>|
        <a href="#numberE">E</a>
    </h3>
<div class="grid">
    <header id="numberA">Allegator</header><br>
    <img src="images/gaterboi.jpg" alt="Allegator" style="width: 75%; height: 500px;"><br>
    <audio controls>
        <source src="audio/gaterboiNoise.mp3" type="audio/mpeg">
    </audio><br><br>
</div>
<div class="grid">
    <header id="numberB">Blobfish</header><br>
    <img src="images/blobby.jpg" alt="Blobfish" style="width: 75%; height: 500px;"><br>
    <audio controls>
        <source src="audio/blobbyNoise.mp3" type="audio/mpeg">
    </audio><br><br>
</div>
<div class="grid">
    <header id="numberC">Cats</header><br>
    <img src="images/catten.jpg" alt="Cat" style="width: 75%; height: 500px;"><br>
    <audio controls>
        <source src="audio/cattenNoise.mp3" type="audio/mpeg">
    </audio><br><br>
</div>
<div class="grid">
    <header id="numberD">Drew</header><br>
    <img src="images/drew.jpg" alt="Drew" style="width: 75%; height: 500px;"><br>
    <audio controls>
        <source src="audio/averageConversationWithDrew.mp3" type="audio/mpeg">
    </audio><br><br>
</div>
<div class="grid">
    <header id="numberE">Echidna</header><br>
    <img src="images/echidna.jpg" alt="Echidna" style="width: 75%; height: 500px;"><br>
    <audio controls>
        <source src="audio/echidnaNoise.mp3" type="audio/mpeg">
    </audio><br><br>
</div>
<a href="#top">Back to top</a>
</body>
</html>
