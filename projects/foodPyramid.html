<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="Author" content="Noah Campbell">
<title>Food Pyramid</title>
<link rel="stylesheet" href="../library/microgrid.css">
<style>
    caption {
        font-size: 1.5em;
        margin-bottom: 10px;
    }
    table, td, th {
        border: 1px solid black;
        border-collapse: collapse;
        padding: 10px;
    }
    thead {
        background-color: darkgreen;
        color: white;
    }
</style>
</head>
<body>
<table>
<caption>USDA Food Pyramid</caption>
    <thead>
        <th></th>
        <th colspan="2">Serving Guidelines</th>
    </thead>
    <thead>
        <th>Food Group</th>
        <th>2005-2010</th>
        <th>2011-present</th>
    </thead>
    <tbody>
        <tr>
            <td><strong>Dairy</strong>
                <br><em>(milk, yogurt, cheese)</em></td>
            <td>2-3</td>
            <td>3-4</td>
        </tr>
        <tr>
            <td><strong>Meat and Beans</strong>
                <br><em>(beef, pultry, fish, beans)</em></td>
            <td>2-3</td>
            <td>5-6</td>
        </tr>
        <tr>
            <td><strong>Fruit</strong></td>
            <td>2-4</td>
            <td>2-4</td>
        </tr>
        <tr>
            <td><strong>Vegetables</strong>
            <td>3-5</td>
            <td>1-2</td>
        </tr>
        <tr>
            <td><strong>Grains</strong>
                <br><em>(bread, donuts, pop tarts)</em></td>
            <td>1-2</td>
            <td>3-5</td>
        </tr>
    </tbody>
</table>
</body>
